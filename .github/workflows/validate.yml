name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
      - name: terraform fmt
        run: terraform fmt -check -recursive

  validate:
    name: Validate modules
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [vpc, eks, rds, alb]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
      - name: terraform init
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}
      - name: terraform validate
        run: terraform validate
        working-directory: modules/${{ matrix.module }}

  tflint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - name: Init tflint
        run: tflint --init
      - name: Run tflint
        run: tflint --recursive

  docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install terraform-docs
        env:
          TFDOCS_VERSION: v0.24.0
        run: |
          curl -sSLo terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/${TFDOCS_VERSION}/terraform-docs-${TFDOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo install terraform-docs /usr/local/bin/
      - name: Regenerate module docs
        run: |
          for module in modules/*/; do
            terraform-docs --config .terraform-docs.yml "$module"
          done
      - name: Fail if docs are out of date
        run: |
          if ! git diff --exit-code -- 'modules/*/README.md'; then
            echo "::error::module docs are stale. Run terraform-docs and commit the result." >&2
            exit 1
          fi
